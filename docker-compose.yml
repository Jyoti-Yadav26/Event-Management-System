version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-event
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_management_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - event-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-management:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-management
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: ""
      DB_URL: jdbc:mysql://mysql:3306/event_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8090:8090"
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  mysql_data:
