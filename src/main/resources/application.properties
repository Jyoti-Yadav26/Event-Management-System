# =============================================================================
# Application
# =============================================================================
spring.application.name=event-management-system

# Load local overrides (gitignored) — copy application-example.properties to
# application-local.properties and set DB password + JWT secret.
spring.config.import=optional:classpath:application-local.properties

# All REST endpoints will be prefixed with /api/v1
server.port=8090
server.servlet.context-path=/api/v1

# =============================================================================
# MySQL Database
# =============================================================================
# createDatabaseIfNotExist=true automatically creates the database on first run
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/event_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate
# =============================================================================
# update = create tables if missing, update schema on entity changes (dev-friendly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================================================
# JWT
# =============================================================================
# Secret must be at least 256 bits (32 characters) for HS256 algorithm.
# Set jwt.secret in application-local.properties or via JWT_SECRET env var.
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================================================
# CORS (React frontend)
# =============================================================================
# Comma-separated origins — add production URL when deploying
app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# =============================================================================
# Swagger / OpenAPI
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
