# =============================================================================
# Application
# =============================================================================
spring.application.name=event-management-system

# All REST endpoints will be prefixed with /api/v1
server.port=8090
server.servlet.context-path=/api/v1

# =============================================================================
# MySQL Database
# =============================================================================
# createDatabaseIfNotExist=true automatically creates the database on first run
spring.datasource.url=jdbc:mysql://localhost:3306/event_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Jyoti@2608*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate
# =============================================================================
# update = create tables if missing, update schema on entity changes (dev-friendly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================================================
# JWT (will be used in Milestone 3 — Authentication)
# =============================================================================
# Secret must be at least 256 bits (32 characters) for HS256 algorithm
jwt.secret=ChangeThisToASecureRandomSecretKeyForProductionUse123
jwt.expiration=86400000

# =============================================================================
# CORS (React frontend)
# =============================================================================
# Comma-separated origins — add production URL when deploying
app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# =============================================================================
# Swagger / OpenAPI
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
